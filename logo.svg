<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <!-- Background circle -->
  <circle cx="54" cy="54" r="42" fill="#1A73E8"/>

  <!-- Wallet body -->
  <rect x="32" y="34" width="44" height="40" rx="4" fill="#FFFFFF"/>

  <!-- Wallet flap -->
  <path d="M32,38 C32,35.8 33.8,34 36,34 L72,34 C74.2,34 76,35.8 76,38 L76,44 L32,44 Z" fill="#1557B0"/>

  <!-- Coin circle -->
  <circle cx="63" cy="59" r="8" fill="#26A69A"/>

  <!-- Dollar sign -->
  <text x="63" y="63" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">$</text>

  <!-- Up arrow (revenue) -->
  <polygon points="46,48 50,52 47.5,52 47.5,58 44.5,58 44.5,52 42,52" fill="#26A69A"/>

  <!-- Down arrow (expense) -->
  <polygon points="46,66 50,62 47.5,62 47.5,56 44.5,56 44.5,62 42,62" fill="#EF5350"/>
</svg>
